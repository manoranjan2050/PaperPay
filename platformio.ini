; ============================================================================
;  PaperPay — E-Paper UPI Counter
;  Target: ESP32-S3-N16R8 (16 MB flash, 8 MB PSRAM)
;  Display: Waveshare 2.9" e-Paper Module (296 x 128, SSD1680 / "V2")
; ============================================================================
[platformio]
default_envs = esp32s3
data_dir = data            ; LittleFS web assets live in /data

[env:esp32s3]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework  = arduino
monitor_speed = 115200
upload_speed  = 921600

; ---- 16 MB flash layout + LittleFS filesystem ------------------------------
board_build.flash_mode = qio
board_build.partitions = default_16MB.csv
board_build.filesystem = littlefs
board_upload.flash_size = 16MB

; ---- N16R8 = QIO 16MB flash + OCTAL (OPI) 8MB PSRAM ------------------------
;  Without qio_opi the core boots in quad-PSRAM mode, fails to find the octal
;  chip, and panics in psramInit() before setup() -> boot loop. This is THE
;  critical setting for the N16R8 / N8R8 modules.
board_build.arduino.memory_type = qio_opi

; ---- N16R8 has 8 MB PSRAM (octal). Enable it. ------------------------------
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1        ; Serial over native USB
    -DCORE_DEBUG_LEVEL=2

; ---- Libraries -------------------------------------------------------------
lib_deps =
    zinggjm/GxEPD2 @ ^1.6.0                 ; e-paper driver (+ Adafruit GFX)
    ricmoo/QRCode @ ^0.0.1                  ; QR code generator
    bblanchon/ArduinoJson @ ^7.2.0          ; JSON for the REST API + storage
    esp32async/AsyncTCP @ ^3.3.2            ; async TCP (maintained fork)
    esp32async/ESPAsyncWebServer @ ^3.6.0   ; async web server + AsyncJson
    https://github.com/tzapu/WiFiManager.git ; captive-portal WiFi onboarding
