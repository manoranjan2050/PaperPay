<svg viewBox="0 0 1060 640" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bz2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2a3344"/><stop offset="1" stop-color="#141a25"/></linearGradient>
    <filter id="s2" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/></filter>
  </defs>
  <rect x="20" y="20" width="1020" height="600" rx="32" fill="url(#bz2)" stroke="#333d4e" stroke-width="2" filter="url(#s2)"/>
  <circle cx="40" cy="320" r="6" fill="#0e131c"/>
  <rect x="52" y="52" width="956" height="536" rx="10" fill="#f6f6f0"/>

