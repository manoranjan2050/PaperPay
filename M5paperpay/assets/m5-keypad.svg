      <g><rect x="30"  y="264" width="140" height="74" rx="12" fill="none" stroke="#111" stroke-width="2"/><text x="100" y="312">4</text></g>
      <g><rect x="182" y="264" width="140" height="74" rx="12" fill="none" stroke="#111" stroke-width="2"/><text x="252" y="312">5</text></g>
      <g><rect x="334" y="264" width="140" height="74" rx="12" fill="none" stroke="#111" stroke-width="2"/><text x="404" y="312">6</text></g>
      <g><rect x="30"  y="348" width="140" height="74" rx="12" fill="none" stroke="#111" stroke-width="2"/><text x="100" y="396">1</text></g>
      <g><rect x="182" y="348" width="140" height="74" rx="12" fill="none" stroke="#111" stroke-width="2"/><text x="252" y="396">2</text></g>
      <g><rect x="334" y="348" width="140" height="74" rx="12" fill="none" stroke="#111" stroke-width="2"/><text x="404" y="396">3</text></g>
      <g><rect x="30"  y="432" width="140" height="74" rx="12" fill="none" stroke="#111" stroke-width="2"/><text x="100" y="480">C</text></g>
      <g><rect x="182" y="432" width="140" height="74" rx="12" fill="none" stroke="#111" stroke-width="2"/><text x="252" y="480">0</text></g>
      <g><rect x="334" y="432" width="140" height="74" rx="12" fill="none" stroke="#111" stroke-width="2"/><text x="404" y="480">&lt;</text></g>
