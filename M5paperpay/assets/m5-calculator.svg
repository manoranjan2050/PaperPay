<svg viewBox="0 0 1060 640" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bz3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2a3344"/><stop offset="1" stop-color="#141a25"/></linearGradient>
    <filter id="s3" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/></filter>
  </defs>
  <rect x="20" y="20" width="1020" height="600" rx="32" fill="url(#bz3)" stroke="#333d4e" stroke-width="2" filter="url(#s3)"/>
  <circle cx="40" cy="320" r="6" fill="#0e131c"/>
  <rect x="52" y="52" width="956" height="536" rx="10" fill="#f6f6f0"/>

  <g transform="translate(52,52)">
    <!-- header -->
    <text x="20" y="40" font-size="28" font-weight="800" fill="#111">DENGAPOL DAHIBARA</text>
    <text x="936" y="38" text-anchor="end" font-size="21" fill="#222">16 Jun  02:30 PM    85%</text>
    <line x1="0" y1="56" x2="956" y2="56" stroke="#111" stroke-width="2"/>

    <!-- calculator display bar -->
    <rect x="20" y="60" width="920" height="68" rx="10" fill="none" stroke="#111" stroke-width="2"/>
    <text x="36" y="98" font-size="24" fill="#555">30 x</text>
    <text x="924" y="112" text-anchor="end" font-size="46" font-weight="800" fill="#111">Rs 60</text>

    <!-- keypad: digits = outline, operators = filled -->
    <g font-weight="700" text-anchor="middle">
      <!-- row0 -->
      <rect x="20"  y="138" width="110" height="64" rx="10" fill="none" stroke="#111" stroke-width="2"/><text x="75"  y="180" font-size="30" fill="#111">C</text>
      <rect x="138" y="138" width="110" height="64" rx="10" fill="none" stroke="#111" stroke-width="2"/><text x="193" y="180" font-size="24" fill="#111">DEL</text>
      <rect x="256" y="138" width="110" height="64" rx="10" fill="#111"/><text x="311" y="182" font-size="34" fill="#fff">/</text>
      <rect x="374" y="138" width="110" height="64" rx="10" fill="#111"/><text x="429" y="182" font-size="34" fill="#fff">x</text>
      <!-- row1 -->
      <rect x="20"  y="208" width="110" height="64" rx="10" fill="none" stroke="#111" stroke-width="2"/><text x="75"  y="250" font-size="30" fill="#111">7</text>
      <rect x="138" y="208" width="110" height="64" rx="10" fill="none" stroke="#111" stroke-width="2"/><text x="193" y="250" font-size="30" fill="#111">8</text>
      <rect x="256" y="208" width="110" height="64" rx="10" fill="none" stroke="#111" stroke-width="2"/><text x="311" y="250" font-size="30" fill="#111">9</text>
      <rect x="374" y="208" width="110" height="64" rx="10" fill="#111"/><text x="429" y="252" font-size="38" fill="#fff">-</text>
      <!-- row2 -->
      <rect x="20"  y="278" width="110" height="64" rx="10" fill="none" stroke="#111" stroke-width="2"/><text x="75"  y="320" font-size="30" fill="#111">4</text>
      <rect x="138" y="278" width="110" height="64" rx="10" fill="none" stroke="#111" stroke-width="2"/><text x="193" y="320" font-size="30" fill="#111">5</text>
      <rect x="256" y="278" width="110" height="64" rx="10" fill="none" stroke="#111" stroke-width="2"/><text x="311" y="320" font-size="30" fill="#111">6</text>
      <rect x="374" y="278" width="110" height="64" rx="10" fill="#111"/><text x="429" y="320" font-size="38" fill="#fff">+</text>
      <!-- row3 -->
      <rect x="20"  y="348" width="110" height="64" rx="10" fill="none" stroke="#111" stroke-width="2"/><text x="75"  y="390" font-size="30" fill="#111">1</text>
      <rect x="138" y="348" width="110" height="64" rx="10" fill="none" stroke="#111" stroke-width="2"/><text x="193" y="390" font-size="30" fill="#111">2</text>
      <rect x="256" y="348" width="110" height="64" rx="10" fill="none" stroke="#111" stroke-width="2"/><text x="311" y="390" font-size="30" fill="#111">3</text>
      <rect x="374" y="348" width="110" height="134" rx="10" fill="#111"/><text x="429" y="423" font-size="40" fill="#fff">=</text>
      <!-- row4 -->
      <rect x="20"  y="418" width="228" height="64" rx="10" fill="none" stroke="#111" stroke-width="2"/><text x="134" y="460" font-size="30" fill="#111">0</text>
      <rect x="256" y="418" width="110" height="64" rx="10" fill="none" stroke="#111" stroke-width="2"/><text x="311" y="460" font-size="30" fill="#111">.</text>
    </g>

    <!-- actions -->
    <rect x="500" y="138" width="440" height="170" rx="14" fill="#111"/>
    <text x="720" y="235" text-anchor="middle" font-size="30" font-weight="700" fill="#fff">CHARGE  →  UPI QR</text>
    <rect x="500" y="322" width="440" height="90" rx="14" fill="none" stroke="#111" stroke-width="2"/>
    <text x="720" y="378" text-anchor="middle" font-size="28" font-weight="700" fill="#111">CASH PAID</text>
    <text x="720" y="452" text-anchor="middle" font-size="19" fill="#666">e.g.  30 × 2 + 40 =  →  CHARGE</text>
  </g>
  <text x="530" y="636" text-anchor="middle" font-size="16" fill="#7d8799" font-weight="600">M5Paper · on-device calculator + UPI billing</text>
</svg>
