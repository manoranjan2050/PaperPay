; ============================================================================
;  M5PaperPay — PaperPay for M5Stack M5Paper (4.7" e-ink, touch, RTC, battery)
;  Reuses the ESP32-S3 build's logic (web/qrpay/store/telegram); only the
;  display + on-device touch UI are M5Paper-specific.
;
;  Library/board combo proven on the user's working M5Paper project:
;  M5Unified + M5GFX, board m5stack-grey (generic ESP32 16MB; M5Unified
;  auto-detects the real M5Paper at runtime).
; ============================================================================
[platformio]
default_envs = m5paper
data_dir = data

[env:m5paper]
platform  = espressif32
board     = m5stack-grey
framework = arduino
monitor_speed = 115200
upload_speed  = 1500000

board_build.flash_size  = 16MB
board_build.partitions  = default_16MB.csv
board_build.filesystem  = littlefs

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=2

lib_deps =
    m5stack/M5Unified @ 0.1.16               ; M5Paper display + touch + RTC + power
    m5stack/M5GFX @ ^0.2.0
    ricmoo/QRCode @ ^0.0.1
    bblanchon/ArduinoJson @ ^7.2.0
    esp32async/AsyncTCP @ ^3.3.2
    esp32async/ESPAsyncWebServer @ ^3.6.0
    https://github.com/tzapu/WiFiManager.git
