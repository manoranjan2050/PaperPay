<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bez" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#222a39"/>
      <stop offset="1" stop-color="#141a25"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- device body -->
  <rect x="40" y="46" width="680" height="300" rx="26" fill="url(#bez)" stroke="#2c3547" stroke-width="2" filter="url(#sh)"/>
  <!-- USB-C nub -->
  <rect x="372" y="342" width="36" height="10" rx="4" fill="#0e131c"/>
  <!-- e-ink screen -->
  <rect x="70" y="74" width="620" height="244" rx="10" fill="#f6f6f0"/>

  <!-- left: shop + amount -->
  <text x="98" y="120" font-size="20" font-weight="700" fill="#111" letter-spacing="2">MY SHOP</text>
  <text x="96" y="206" font-size="66" font-weight="800" fill="#0a0a0a">₹149.00</text>
  <text x="98" y="250" font-size="19" fill="#444">Scan with any UPI app</text>
  <text x="98" y="276" font-size="19" fill="#444">to pay</text>
  <line x1="486" y1="92" x2="486" y2="300" stroke="#dcdcd5" stroke-width="2"/>

  <!-- right: QR -->
  <g transform="translate(512,110)">
    <!-- finders -->
    <rect x="0"   y="0"   width="56" height="56" fill="#111"/><rect x="8"   y="8"   width="40" height="40" fill="#f6f6f0"/><rect x="16"  y="16"  width="24" height="24" fill="#111"/>
    <rect x="112" y="0"   width="56" height="56" fill="#111"/><rect x="120" y="8"   width="40" height="40" fill="#f6f6f0"/><rect x="128" y="16"  width="24" height="24" fill="#111"/>
    <rect x="0"   y="112" width="56" height="56" fill="#111"/><rect x="8"   y="120" width="40" height="40" fill="#f6f6f0"/><rect x="16"  y="128" width="24" height="24" fill="#111"/>
    <!-- data modules -->
    <g fill="#111">
      <rect x="64" y="0" width="8" height="8"/><rect x="80" y="0" width="8" height="8"/><rect x="96" y="0" width="8" height="8"/>
      <rect x="72" y="16" width="8" height="8"/><rect x="96" y="24" width="8" height="8"/><rect x="64" y="32" width="8" height="8"/>
      <rect x="88" y="32" width="8" height="8"/><rect x="80" y="40" width="8" height="8"/><rect x="96" y="48" width="8" height="8"/>
      <rect x="64" y="48" width="8" height="8"/><rect x="64" y="16" width="8" height="8"/><rect x="88" y="8" width="8" height="8"/>
      <rect x="48" y="64" width="8" height="8"/><rect x="80" y="64" width="8" height="8"/><rect x="112" y="64" width="8" height="8"/><rect x="144" y="64" width="8" height="8"/>
      <rect x="0" y="64" width="8" height="8"/><rect x="16" y="80" width="8" height="8"/><rect x="32" y="64" width="8" height="8"/><rect x="8" y="96" width="8" height="8"/>
      <rect x="40" y="96" width="8" height="8"/><rect x="0" y="104" width="8" height="8"/><rect x="24" y="104" width="8" height="8"/>
      <rect x="112" y="80" width="8" height="8"/><rect x="144" y="72" width="8" height="8"/><rect x="160" y="88" width="8" height="8"/><rect x="120" y="96" width="8" height="8"/>
      <rect x="136" y="104" width="8" height="8"/><rect x="160" y="104" width="8" height="8"/><rect x="104" y="72" width="8" height="8"/>
      <rect x="64" y="64" width="8" height="8"/><rect x="72" y="80" width="8" height="8"/><rect x="96" y="72" width="8" height="8"/><rect x="64" y="96" width="8" height="8"/>
      <rect x="88" y="104" width="8" height="8"/><rect x="80" y="88" width="8" height="8"/>
      <rect x="64" y="112" width="8" height="8"/><rect x="80" y="112" width="8" height="8"/><rect x="96" y="120" width="8" height="8"/>
      <rect x="72" y="128" width="8" height="8"/><rect x="88" y="144" width="8" height="8"/>
      <rect x="64" y="128" width="8" height="8"/><rect x="72" y="144" width="8" height="8"/><rect x="80" y="128" width="8" height="8"/><rect x="96" y="136" width="8" height="8"/>
      <rect x="104" y="128" width="8" height="8"/><rect x="120" y="136" width="8" height="8"/><rect x="136" y="128" width="8" height="8"/><rect x="160" y="144" width="8" height="8"/>
      <rect x="72" y="160" width="8" height="8"/><rect x="104" y="160" width="8" height="8"/><rect x="136" y="160" width="8" height="8"/><rect x="160" y="160" width="8" height="8"/>
      <rect x="88" y="152" width="8" height="8"/><rect x="120" y="152" width="8" height="8"/><rect x="152" y="120" width="8" height="8"/>
      <rect x="112" y="112" width="8" height="8"/><rect x="144" y="112" width="8" height="8"/><rect x="128" y="160" width="8" height="8"/>
    </g>
    <!-- pulsing scan ring (animated where supported) -->
    <circle cx="84" cy="84" r="96" fill="none" stroke="#16b886" stroke-width="3" opacity="0">
      <animate attributeName="r" values="84;112" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="400" y="392" text-anchor="middle" font-size="17" fill="#7d8799" font-weight="600">Waveshare 2.9&quot; e‑Paper · ESP32‑S3</text>
</svg>
