<svg viewBox="0 0 380 760" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0ea975"/><stop offset="1" stop-color="#16b886"/>
    </linearGradient>
    <filter id="ph" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- phone -->
  <rect x="20" y="20" width="340" height="720" rx="46" fill="#0b0e13" stroke="#2a3340" stroke-width="2" filter="url(#ph)"/>
  <rect x="34" y="40" width="312" height="680" rx="32" fill="#0f1115"/>
  <rect x="160" y="52" width="60" height="8" rx="4" fill="#222a36"/>

  <!-- header -->
  <rect x="54" y="80" width="34" height="34" rx="9" fill="#10271f"/>
  <text x="71" y="105" text-anchor="middle" font-size="20" fill="#16b886">▣</text>
  <text x="98" y="98" font-size="19" font-weight="700" fill="#e8edf2">PaperPay</text>
  <circle cx="100" cy="111" r="4" fill="#16b886"><animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/></circle>
  <text x="112" y="115" font-size="11" fill="#8a94a6">192.168.1.113 · online</text>

  <!-- amount card -->
  <rect x="50" y="132" width="280" height="104" rx="16" fill="#171a21" stroke="#2a3340"/>
  <text x="190" y="160" text-anchor="middle" font-size="12" fill="#8a94a6">Amount to charge</text>
  <text x="190" y="208" text-anchor="middle" font-size="42" font-weight="800" fill="#e8edf2">₹149.00</text>

  <!-- keypad -->
  <g>
    <!-- row1 -->
    <g><rect x="50"  y="256" width="84" height="60" rx="12" fill="#171a21" stroke="#2a3340"/><text x="92"  y="294" text-anchor="middle" font-size="24" fill="#e8edf2">7</text></g>
    <g><rect x="148" y="256" width="84" height="60" rx="12" fill="#171a21" stroke="#2a3340"/><text x="190" y="294" text-anchor="middle" font-size="24" fill="#e8edf2">8</text></g>
    <g><rect x="246" y="256" width="84" height="60" rx="12" fill="#171a21" stroke="#2a3340"/><text x="288" y="294" text-anchor="middle" font-size="24" fill="#e8edf2">9</text></g>
    <!-- row2 -->
    <g><rect x="50"  y="324" width="84" height="60" rx="12" fill="#171a21" stroke="#2a3340"/><text x="92"  y="362" text-anchor="middle" font-size="24" fill="#e8edf2">4</text></g>
    <g><rect x="148" y="324" width="84" height="60" rx="12" fill="#171a21" stroke="#2a3340"/><text x="190" y="362" text-anchor="middle" font-size="24" fill="#e8edf2">5</text></g>
    <g><rect x="246" y="324" width="84" height="60" rx="12" fill="#171a21" stroke="#2a3340"/><text x="288" y="362" text-anchor="middle" font-size="24" fill="#e8edf2">6</text></g>
    <!-- row3 -->
    <g><rect x="50"  y="392" width="84" height="60" rx="12" fill="#171a21" stroke="#2a3340"/><text x="92"  y="430" text-anchor="middle" font-size="24" fill="#e8edf2">1</text></g>
    <g><rect x="148" y="392" width="84" height="60" rx="12" fill="#171a21" stroke="#2a3340"/><text x="190" y="430" text-anchor="middle" font-size="24" fill="#e8edf2">2</text></g>
    <g><rect x="246" y="392" width="84" height="60" rx="12" fill="#171a21" stroke="#2a3340"/><text x="288" y="430" text-anchor="middle" font-size="24" fill="#e8edf2">3</text></g>
    <!-- row4 -->
    <g><rect x="50"  y="460" width="84" height="60" rx="12" fill="#171a21" stroke="#2a3340"/><text x="92"  y="498" text-anchor="middle" font-size="22" fill="#8a94a6">00</text></g>
    <g><rect x="148" y="460" width="84" height="60" rx="12" fill="#171a21" stroke="#2a3340"/><text x="190" y="498" text-anchor="middle" font-size="24" fill="#e8edf2">0</text></g>
    <g><rect x="246" y="460" width="84" height="60" rx="12" fill="#171a21" stroke="#2a3340"/><text x="288" y="498" text-anchor="middle" font-size="24" fill="#e8edf2">.</text></g>
  </g>

  <!-- charge button -->
  <rect x="50" y="540" width="280" height="58" rx="14" fill="url(#btn)"/>
  <text x="190" y="577" text-anchor="middle" font-size="18" font-weight="700" fill="#04241b">Generate UPI QR →</text>

  <!-- tab bar -->
  <line x1="34" y1="636" x2="346" y2="636" stroke="#2a3340"/>
  <g text-anchor="middle">
    <text x="110" y="672" font-size="22">💳</text><text x="110" y="692" font-size="11" fill="#16b886">Bill</text>
    <text x="190" y="672" font-size="22">📜</text><text x="190" y="692" font-size="11" fill="#8a94a6">Payments</text>
    <text x="270" y="672" font-size="22">⚙️</text><text x="270" y="692" font-size="11" fill="#8a94a6">Settings</text>
  </g>
</svg>
